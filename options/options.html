<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto Reply AI - Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 2rem;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #fff;
      border-bottom: 2px solid #4a4e69;
      padding-bottom: 0.75rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #c0c0d0;
    }
    input, textarea, select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      margin-bottom: 1.2rem;
      border: 1px solid #4a4e69;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 0.9rem;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #7b68ee;
      box-shadow: 0 0 0 2px rgba(123, 104, 238, 0.2);
    }
    textarea { resize: vertical; min-height: 100px; }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .checkbox-group input { width: auto; margin: 0; }
    .checkbox-group label { margin: 0; }
    button {
      background: #7b68ee;
      color: #fff;
      border: none;
      padding: 0.7rem 2rem;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #6a5acd; }
    .status {
      margin-top: 1rem;
      padding: 0.6rem;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
    }
    .status.success { display: block; background: #1b4332; color: #95d5b2; }
    .status.error { display: block; background: #4a1525; color: #f4a0b0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Auto Reply AI - Settings</h1>

    <label for="apiFormat">API Format</label>
    <select id="apiFormat">
      <option value="openai">OpenAI Compatible (/v1/chat/completions)</option>
      <option value="anthropic">Anthropic (/v1/messages)</option>
    </select>

    <label for="apiUrl">API URL</label>
    <input type="url" id="apiUrl" placeholder="https://api.openai.com/v1/chat/completions" />

    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." />

    <label for="model">Model</label>
    <input type="text" id="model" placeholder="gpt-4o-mini" />

    <label for="systemPrompt">System Prompt</label>
    <textarea id="systemPrompt" placeholder="You are a helpful email assistant..."></textarea>

    <button id="save">Save Settings</button>
    <div id="status" class="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
