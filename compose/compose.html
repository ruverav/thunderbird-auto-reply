<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 1rem;
      width: 340px;
    }
    h2 {
      font-size: 1rem;
      margin-bottom: 0.4rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .info {
      font-size: 0.75rem;
      color: #6a6e89;
      margin-bottom: 0.8rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      margin-bottom: 0.3rem;
      color: #c0c0d0;
    }
    textarea {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 0.8rem;
      border: 1px solid #4a4e69;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 0.85rem;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
    }
    textarea:focus {
      outline: none;
      border-color: #7b68ee;
      box-shadow: 0 0 0 2px rgba(123, 104, 238, 0.2);
    }
    textarea::placeholder {
      color: #6a6e89;
    }
    button {
      width: 100%;
      background: #7b68ee;
      color: #fff;
      border: none;
      padding: 0.6rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #6a5acd; }
    button:disabled { background: #4a4e69; cursor: not-allowed; }
    .status {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      min-height: 1.2rem;
      text-align: center;
    }
    .status.success { color: #95d5b2; }
    .status.error { color: #f4a0b0; }
    .status.loading { color: #a0c4ff; }
  </style>
</head>
<body>
  <h2>✍️ AI Compose</h2>
  <p class="info">Improve or generate the email content with AI.</p>

  <label for="instructions">Instructions (optional)</label>
  <textarea id="instructions" placeholder="e.g., Make it more professional, Add bullet points, Make it shorter..."></textarea>

  <button id="generate">✨ Generate / Improve</button>
  <div id="status" class="status"></div>

  <script src="compose.js"></script>
</body>
</html>
